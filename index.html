<!DOCTYPE html>
<html lang="pr-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medidor de Idade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="carregar()">

    
    <header>
        <h2>Medindo sua Idade</h2>
     </header>

    <main>
        <section>

        <div id="msg">
           <p>
            <label for="txtano">Ano do seu nascimento:</label>
            <input type="number" name="ano" id="txtano">
           </p>
           <div id="borda">
               <p>Sexo:
                <input type="radio" name="radsex" id="mas" checked>
                <label for="mas">Mascolino</label>
                <input type="radio" name="radsex" id="fem" >
                <label for="fem">Feminino</label>
               </p>
           </div>
           <p>
            <input type="button" value="Verificar" id="botao"  onclick="verificar()"> 
           </p>
        </div>

        <div>
            <p id="res">Resultado...</p>
            
        </div>

        </section>
    </main>


    <footer>

        <p>
            Site desnvolvido por Felipe Santos
        </p>
     </footer>
    <script src="script.js"></script>
</body>
</html>
